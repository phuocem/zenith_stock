name: zenith_stock
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  supabase_flutter: ^2.8.3
  fl_chart: ^0.71.0
  google_fonts: ^7.0.0
  intl: ^0.20.2
  flutter_svg: ^2.0.17
  dio: ^5.8.0+1
  logger: ^2.5.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

flutter:

  uses-material-design: true

  assets:
    - assets/images/app_logo.png
    - .env

